<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Showza - Watch</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="../inject-header.js" defer></script>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="shortcut icon" href="../assets/favicon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body bgcolor="#000000" text="#ffff00" link="#97e6d1" vlink="#ffffff">
  <div id="showza-header"></div>
  <div class="centered">
    <img src="../assets/watch logo.png" alt="Watch" width="250" style="margin-top:12px;">
    <p class="tag">a variety of content you can find on our youtube channel</p>
  </div>
  <section class="video-grid">
    <div class="video-item">
      <iframe src="https://www.youtube.com/embed/xyz" title="YouTube video" frameborder="0" allowfullscreen></iframe>
      <p class="tag">Gub 2 Gub: A short film</p>
    </div>
    <div class="video-item">
      <iframe src="https://www.youtube.com/embed/abc" title="YouTube video" frameborder="0" allowfullscreen></iframe>
      <p class="tag">North Camp (live)</p>
    </div>
    <div class="video-item">
      <iframe src="https://www.youtube.com/embed/def" title="YouTube video" frameborder="0" allowfullscreen></iframe>
      <p class="tag">Water Park (live)</p>
    </div>
  </section>
</body>
</html>
